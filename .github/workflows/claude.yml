name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          additional_permissions: |
            actions: read

          custom_instructions: |
            # Project context
            This is a Next.js 16 personal website (personal-website / ying-ge-site).
            Project design rules: see @CLAUDE.md
            Auto-fix tier policy: see @docs/auto-fix-tiers.md

            # Scope discipline
            Only modify files directly related to the request. Do not touch sibling
            components, pages, or shared utilities unless explicitly asked. If a fix
            would require changes outside the obvious scope, stop and leave a PR
            comment describing what's needed and why.

            # Blocked files (never modify in remote mode)
            Never modify these — if a change seems to require touching one, stop and
            leave a PR comment describing what you would do and why. Do not edit:
            - .github/** (workflows, actions, dependabot, etc.)
            - .env*, *.pem, *.key, credentials*.json
            - package.json, package-lock.json, pnpm-lock.yaml, yarn.lock, bun.lockb
            - next.config.*, tsconfig.json, tailwind.config.*, vercel.json
            - .eslintrc*, eslint.config.*, .prettierrc*, prettier.config.*
            - .gitignore, .gitattributes
            - CLAUDE.md, docs/auto-fix-tiers.md, docs/design-system.md
            - LICENSE*

            # Auto-fix discipline
            Follow docs/auto-fix-tiers.md strictly. Never use --no-verify, `any`
            casts, --force, or disable rules to silence errors. Fix the root cause.

            # Build verification
            After making code changes, run `npm run build` to verify the project
            still builds. If it fails, fix the error before committing. If the fix
            would require editing a blocked file, stop and comment instead.

            # Visual verification (when relevant)
            For UI changes, use the Playwright MCP server to capture screenshots at
            these viewports and attach them to the PR:
            - 402x874 (iPhone 17)
            - 1440x900 (desktop)
            - 2560x1080 (ultrawide)
            Check: no horizontal scroll, no text clipping, touch targets >=44px on
            mobile. Save screenshots to ./screenshots/ in the PR.

            # Commit discipline
            - Commit messages: 1-2 sentences explaining why (not just what)
            - Stage files explicitly by name (never `git add .` or `git add -A`)
            - Include the standard co-author trailer
            - Never force-push, reset --hard, or delete branches

          mcp_config: |
            {
              "mcpServers": {
                "playwright": {
                  "command": "npx",
                  "args": [
                    "@playwright/mcp@latest",
                    "--headless",
                    "--isolated"
                  ]
                }
              }
            }

          claude_args: '--allowed-tools Bash(npm:*),Bash(npx:*),Bash(git:*),Bash(ls:*),Bash(cat:*),Bash(mkdir:*),mcp__playwright__browser_navigate,mcp__playwright__browser_snapshot,mcp__playwright__browser_take_screenshot,mcp__playwright__browser_resize,mcp__playwright__browser_evaluate,mcp__playwright__browser_close'
